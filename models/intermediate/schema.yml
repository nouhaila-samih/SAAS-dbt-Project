version: 2

models:

  - name: int_customer_subscriptions
    description: "Enriched subscription model combining customers and subscriptions with derived business logic"

    columns:

      - name: customer_id
        description: "Unique identifier of the customer"
        tests:
          - not_null

      - name: subscription_id
        description: "Unique identifier of the subscription"
        tests:
          - not_null

      - name: signup_date
        description: "Customer signup date"

      - name: country
        description: "Customer country"

      - name: plan
        description: "Customer subscription plan (0, 30, 100)"

      - name: start_date
        description: "Subscription start date"

      - name: end_date
        description: "Subscription end date (NULL if active)"

      - name: subscription_duration_months
        description: "Duration of subscription in months"

      - name: is_active
        description: "Flag indicating if subscription is active (1) or not (0)"
        tests:
          - accepted_values:
              values: [0, 1]

  - name: int_customer_payments
    description: "Enriched payments model combining payments with customer and plan information"

    columns:

      - name: customer_id
        description: "Unique identifier of the customer"
        tests:
          - not_null

      - name: payment_id
        description: "Unique identifier of the payment"
        tests:
          - not_null

      - name: payment_date
        description: "Date when payment was made"

      - name: payment_month
        description: "Month extracted from payment date for aggregation purposes"

      - name: amount
        description: "Payment amount based on subscription plan"

      - name: plan
        description: "Customer subscription plan (0, 30, 100)"

  - name: int_customer_events
    description: "Aggregated customer event metrics for engagement analysis"

    columns:

      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique

      - name: total_events
        description: "Total number of events per customer"
        tests:
          - not_null

      - name: first_event_date
        description: "First recorded event for the customer"

      - name: last_event_date
        description: "Most recent event date"

      - name: days_since_last_event
        description: "Days since last activity"
        tests:
          - not_null